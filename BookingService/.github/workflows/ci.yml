name: DevSecOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Lint / Code formatting
        run: dotnet format --verify-no-changes

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --verbosity normal

      # Install Java for SonarCloud
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install SonarCloud scanner
      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      # Begin SonarCloud analysis
      - name: Begin SonarCloud analysis
        run: |
          dotnet sonarscanner begin \
          /k:"StaffSystemW_BookingService" \
          /o:"staffsystemw" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io"

      - name: Build for Sonar
        run: dotnet build

      - name: End SonarCloud analysis
        run: |
          dotnet sonarscanner end \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

      # Install CycloneDX tool
      - name: Install CycloneDX
        run: dotnet tool install --global CycloneDX

      # Generate SBOM
      - name: Generate SBOM
        run: dotnet CycloneDX . -o sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom

      # Filesystem security scan
      - name: Run filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH

      # Build Docker image
      - name: Build Docker image
        run: docker build -t my-api .

      # Scan Docker image
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my-api
          severity: CRITICAL,HIGH
