global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5000']

  - job_name: 'services'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'host.docker.internal:5001'
          - 'host.docker.internal:5002'
          - 'host.docker.internal:5003'
          - 'host.docker.internal:5004'