version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-dev
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "echo 'SQL Server container is running'"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-api:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: ${AUTH_CONNECTION_STRING}
    depends_on:
      - sqlserver
    ports:
      - "5001:8080"

  profile-api:
    build:
      context: ./ProfileService
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: ${PROFILE_CONNECTION_STRING}
    depends_on:
      - sqlserver
    ports:
      - "5002:8080"

  booking-api:
    build:
      context: ./BookingService
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: ${BOOKING_CONNECTION_STRING}
    depends_on:
      - sqlserver
    ports:
      - "5003:8080"

  workshift-api:
    build:
      context: ./WorkshiftService
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: ${WORKSHIFT_CONNECTION_STRING}
    depends_on:
      - sqlserver
    ports:
      - "5004:8080"

  yarp-gateway:
    build:
      context: ./YarpGateway
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"
    depends_on:
      - auth-api
      - profile-api
      - booking-api
      - workshift-api

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - yarp-gateway

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./Infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

volumes:
  sql_data:
