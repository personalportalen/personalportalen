server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # 🔥 1. API – ABSOLUT högsta prioritet
    location ^~ /api/ {
        proxy_pass http://yarp-gateway:8080;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # extra skydd
        proxy_redirect off;
    }

    # 🔥 2. PERSONALPORTALEN (frontend)
    location ^~ /personalportalen/ {
        rewrite ^/personalportalen/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # 🔥 3. STATIC FILES (viktigt för JS)
    location /assets/ {
        try_files $uri =404;
    }

    # 🔥 4. fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}